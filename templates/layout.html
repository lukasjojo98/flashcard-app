<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}{% endblock %}</title>
</head>
<style>
.nav-header {
    height: 60px;
    background-color: #dee2e6;
}
* {
    padding: 0;
    margin: 0;
}
.navbar-container {
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 100%;
}
.navbar-container a {
    text-decoration: none;
    color: inherit;
}
.deck-list {
    display: flex;
    flex-direction: column;
    align-items: center;
}
.deck-item {
    width: 70%;
    margin: 10px 0;
    padding: 10px 30px;
    background-color: #f0f0f0;
    border: 1px solid #ccc;
    text-align: center;
    display: flex;
    justify-content: space-between;
}
.study-container {
    display: flex;
    gap: 20px;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
}
.question, .answer {
    width: 50%;
    padding: 20px;
    background-color: #f9f9f9;
    border: 1px solid #ddd;
    text-align: center;
    font-size: 18px;
}
.answer {
    background-color: #e9ecef;
}
.auth-card {
    width: 85%;
    max-width: 420px;
    margin: 40px auto;
    padding: 24px;
    background-color: #f8f9fa;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}
.auth-title {
    text-align: center;
    margin-bottom: 18px;
    color: #333;
}
.auth-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.auth-input {
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background-color: #fff;
    color: #222;
    font-size: 16px;
}
.auth-input:focus {
    outline: 2px solid #007bff;
    border-color: #007bff;
}
.auth-btn {
    padding: 10px 16px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    background-color: #007bff;
    color: #fff;
    cursor: pointer;
}
.auth-btn:hover {
    background-color: #0056b3;
}
.btn {
    padding: 10px 20px;
    background-color: #007bff;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
}
.btn a {
    color: white;
    text-decoration: none;
}
.subitem {
    display: flex;
    gap: 20px;
    align-items: center;
}
#reveal-btn:hover {
    background-color: #0056b3;
}
#next-btn:hover {
    background-color: #0056b3;
}
.end-items, .start-items {
    display: flex;
    gap: 20px;
}
.button-container {
    display: flex;
    gap: 20px;
}
.card-image-container {
    display: flex;
    flex-direction: row;
    gap: 20px;
}
</style>
<body>
    <div class="nav-header">
        <div class="navbar-container">
            <div class="start-items">
                <a href="/decks">Decks</a>
                <a href="/add">Add</a>
                <a href="/">Search</a>
            </div>
            <div class="end-items">
                <a href="/">Account</a>
                {% if session["user_id"] %}
                    <a href="/logout">Log Out</a>
                {% else %}
                    <a href="/login">Log In</a>
                    <a href="/register">Register</a>
                {% endif %}
            </div>
        </div>
    </div>
    {% block main %}
    {% endblock %}
</body>
</html>
