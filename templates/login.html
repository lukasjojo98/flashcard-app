{% extends "layout.html" %}

{% block title %}
    Log In
{% endblock %}

{% block main %}
    <div class="auth-card">
        <h2 class="auth-title">Log In</h2>
        <form action="/login" method="post" class="auth-form">
            <input autocomplete="off" autofocus class="auth-input" id="username" name="username" placeholder="Username" type="text">
            <input class="auth-input" id="password" name="password" placeholder="Password" type="password">
            <button class="auth-btn" type="submit">Log In</button>
        </form>
    </div>
{% endblock %}
