{% extends "layout.html" %}

{% block main %}
    <div class="auth-card">
        <h2 class="auth-title">Register</h2>
        <form action="/register" method="post" class="auth-form">
            <input autocomplete="off" autofocus class="auth-input" id="username" name="username" placeholder="Username" type="text">
            <input class="auth-input" id="password" name="password" placeholder="Password" type="password">
            <input class="auth-input" id="confirmation" name="confirmation" placeholder="Confirmation" type="password">
            <button class="auth-btn" type="submit">Register</button>
        </form>
    </div>
{% endblock %}
